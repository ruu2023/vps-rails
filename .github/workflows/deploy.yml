name: Deploy with Kamal 2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Kamal Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. コードのチェックアウト
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Rubyのセットアップ（Kamalを実行するために必要）
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.1" # あなたの開発環境のRubyバージョンに合わせて調整してください
          bundler-cache: true

      # 3. SSH鍵の配置と起動（Kamalがサーバーに接続できるようにする）
      - name: Set up SSH Key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # 4. 念のため、Kamalを実行する前に既存の古いKamalビルダーの残骸をクレンジングしておく
      - name: Clear potentially broken kamal builders
        run: |
          docker buildx rm kamal-local-docker-container 2>/dev/null || true

      # 5. Kamalのインストール
      - name: Install Kamal
        run: gem install kamal

      # 1. 先にDocker公式のActionを使い、ホストとBuildxの両方に認証を通す
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: kokihiru
          password: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}

      # 6. デプロイの実行（GitHubのSecretsを環境変数として注入）
      - name: Run Kamal Deploy
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          DOCKER_BUILDKIT: 1
        run: |
          mkdir -p ~/.ssh

          # 念のため、過去の隔離された不完全なBuilderキャッシュがあれば削除
          docker buildx rm kamal-local-docker-container || true

          kamal deploy

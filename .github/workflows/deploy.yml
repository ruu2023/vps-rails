name: Deploy with Kamal 2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Kamal Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. コードのチェックアウト
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Rubyのセットアップ（bundler-cacheで次回から一瞬に）
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.1"
          bundler-cache: true

      # 3. Kamalのインストール（最新版を固定してインストール）
      - name: Install Kamal
        run: gem install kamal

      # 4. SSH鍵の配置と起動
      - name: Set up SSH Key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # 5. GitHub Actionsに最適化されたDocker Buildxをセットアップ
      # これを入れることで、GitHub Actionsのキャッシュ（gha）との連携が100%発揮されます
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 6. Docker Hubへのログイン
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: kokihiru
          password: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}

      # 7. デプロイの実行
      - name: Run Kamal Deploy
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
        run: |
          # 認証を通した状態で、Kamalにビルドとデプロイを任せる
          # deploy.ymlに書いた cache: type: gha を自動的に認識して爆速になります
          kamal deploy
